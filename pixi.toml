[workspace]
authors = ["Matthew W. Thompson <mattwthompson@protonmail.com>"]
channels = ["conda-forge"]
name = "openff-units"
platforms = ["osx-arm64", "linux-64"]

[tasks]
run_dummy_tests = "python -m pytest -v -n auto downstream_dummy/tests/"
run_tests = "python -m pytest -v -n auto openff/units/"
run_mypy = "python -m mypy -p 'openff.units' && python -m mypy downstream_dummy/ --exclude=downstream_dummy/build/"
run_docexamples = "pytest --doctest-modules openff --ignore=openff/units/_tests"

[dependencies]
python = "*"
pip = "*"
numpy = "*"
pint = "*"
openff-utilities = ">=0.1.3"
uncertainties = "*"

[pypi-dependencies]
openff-units = { path = ".", editable = true}
openff-units-downstream-dummy = { path = "downstream_dummy/" }

[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-xdist = "*"
pytest-randomly = "*"

[feature.typing.dependencies]
mypy = "*"
types-setuptools = "*"

[feature.dev.dependencies]
pre-commit = "*"
ipython = "*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py314.dependencies]
python = "3.14.*"

[feature.openmm.dependencies]
openmm = ">=8.3"

[feature.pint24.dependencies]
pint = "0.24.*"

[feature.pint25.dependencies]
pint = "0.25.*"

[environments]
dev = [ "py312", "test", "typing", "dev"]
py311pint24 = [ "py311", "test", "typing", "pint24" ]
py312pint24 = [ "py312", "test", "typing", "pint24" ]
py313pint24 = [ "py313", "test", "typing", "pint24" ]
py314pint24 = [ "py314", "test", "typing", "pint24" ]
py311pint24openmm = [ "py311", "test", "typing", "pint24", "openmm" ]
py312pint24openmm = [ "py312", "test", "typing", "pint24", "openmm" ]
py313pint24openmm = [ "py313", "test", "typing", "pint24", "openmm" ]
py314pint24openmm = [ "py314", "test", "typing", "pint24", "openmm" ]
py311pint25 = [ "py311", "test", "typing", "pint25" ]
py312pint25 = [ "py312", "test", "typing", "pint25" ]
py313pint25 = [ "py313", "test", "typing", "pint25" ]
py314pint25 = [ "py314", "test", "typing", "pint25" ]
py311pint25openmm = [ "py311", "test", "typing", "pint25", "openmm" ]
py312pint25openmm = [ "py312", "test", "typing", "pint25", "openmm" ]
py313pint25openmm = [ "py313", "test", "typing", "pint25", "openmm" ]
py314pint25openmm = [ "py314", "test", "typing", "pint25", "openmm" ]